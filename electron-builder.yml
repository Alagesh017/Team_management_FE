appId: com.team-management.app
productName: Team Management
directories:
  output: release
files:
  - dist/**/*
  - main.cjs
  - package.json
asar: true
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Team Management
